<div class="content">

          width="13"

  </div>

<script>
const obs = new IntersectionObserver((entries) => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add("visible"), i * 120);
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });
document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
</script>

<script>
document.addEventListener('keydown', e => {
  if (e.key === '1') window.location.href = 'index.html';
  if (e.key === '2') window.location.href = 'about.html';
  if (e.key === '3') window.location.href = 'subsystems.html';
  if (e.key === '4') window.location.href = 'specs.html';
  if (e.key === '5') window.location.href = 'info.html';
  if (e.key === '6') window.location.href = 'outreach.html';
});
</script>
